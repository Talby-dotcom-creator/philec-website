<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Electrician Hemel Hempstead &amp; Watford | PHILEC | Phil Rees Electrical Contractor</title>
    <meta
      name="description"
      content="PHILEC is a local electrical contractor based in Hemel Hempstead, serving Watford, Hertfordshire and surrounding areas. Domestic, commercial and industrial electrical services by Phil Rees."
    />
  </head>
  <body>
    <div id="root"></div>
    <!-- Hidden Netlify form for build-time detection -->
    <form name="contact" method="POST" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="contact" />
      <input name="name" />
      <input name="phone" />
      <input name="email" />
      <input name="postcode" />
      <input name="workType" />
      <textarea name="message"></textarea>
      <input name="bot-field" />
    </form>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
